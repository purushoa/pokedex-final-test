name: Periodic Health Check

on:
  schedule:
    - cron: '0 0 * * *' 
  workflow_dispatch:

jobs:
  periodic_health_check:
    runs-on: ubuntu-latest
    steps:
      - name: URL Health Check
        uses: jasonkeller/url-health-check@v1
        with:
          url: https://pokedex-deployment-audr.onrender.com/health
          max-attempts: 3
          retry-delay: 5s

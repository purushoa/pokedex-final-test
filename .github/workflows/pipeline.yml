name: Deployment pipeline

on:
  push:
    branches:
      - main
  pull_request:
    branches: [main]
    types: [opened, synchronize]

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - run: npm install
      - run: npm run eslint

  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - run: npm install
      - run: npm test

  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - run: npm install
      - run: npm run build

  e2e:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - run: npm install
      - run: npx playwright install --with-deps
      - name: Build and Run E2E
        run: |
          npm run build
          npm run start-prod & 
          npx wait-on http://127.0.0.1:8080 --timeout 60000
          npm run test:e2e
        env:
          PORT: 8080

  deploy:
    needs: [lint, test, build, e2e]
    if: ${{ github.event_name == 'push' && !contains(join(github.event.commits.*.message, ' '), '#skip') }}
    runs-on: ubuntu-latest
    steps:
      - name: Trigger Render deployment
        run: curl "${{ secrets.RENDER_DEPLOY_HOOK }}"

  tag_release:
    needs: [lint, test, build, e2e]
    if: ${{ github.event_name == 'push' && !contains(join(github.event.commits.*.message, ' '), '#skip') && success() }}
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Bump version and push tag
        uses: anothrNick/github-tag-action@1.64.0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          DEFAULT_BUMP: patch

  notify_success:
    needs: [deploy, tag_release]
    if: ${{ success() }}
    runs-on: ubuntu-latest
    steps:
      - name: Send success notification
        uses: Ilshidur/action-discord@0.3.2
        env:
          DISCORD_WEBHOOK: ${{ secrets.FINAL_DISCORD_WEBHOOK }}
        with:
          args: |
            ✅ Deployment successful!
            Repository: ${{ github.repository }}
            Commit: ${{ github.sha }}

  notify_failure:
    needs: [lint, test, build, e2e, deploy, tag_release]
    if: ${{ failure() }}
    runs-on: ubuntu-latest
    steps:
      - name: Send failure notification
        uses: Ilshidur/action-discord@0.3.2
        env:
          DISCORD_WEBHOOK: ${{ secrets.FINAL_DISCORD_WEBHOOK }}
        with:
          args: |
            ❌ Build failed!
            Check logs: https://github.com/${{ github.repository }} /actions/runs/${{ github.run_id }}
